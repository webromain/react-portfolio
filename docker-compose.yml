version: '3'

# Le service 'portfolio' a ete retire du compose intentionnellement.
# Le git-poller est le seul gestionnaire du container portfolio-app.
# Cela evite les conflits de nommage lors des mises a jour de la stack via Portainer.

services:
  git-poller:
    image: docker:latest
    container_name: portfolio-git-poller
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=1M
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache curl > /dev/null 2>&1
        REPO="webromain/react-portfolio"
        BRANCH="main"
        CONTAINER="portfolio-app"
        IMAGE="portfolio-image"
        INTERVAL=300
        SHA_FILE="/tmp/last_sha"

        start_container() {
          docker run -d \
            --name $$CONTAINER \
            --restart always \
            --network nginx-proxy \
            -e NODE_ENV=production \
            -e VIRTUAL_HOST=portfolio.romainpoisson.com \
            -e LETSENCRYPT_HOST=portfolio.romainpoisson.com \
            -e LETSENCRYPT_EMAIL=admin@romainpoisson.com \
            $$IMAGE
        }

        echo "================================================="
        echo " Git Poller demarre - repo: $$REPO#$$BRANCH"
        echo " Verification toutes les $${INTERVAL}s"
        echo "================================================="

        # Premier demarrage : build + lancement si le container n'existe pas encore
        if ! docker inspect $$CONTAINER > /dev/null 2>&1; then
          echo "[INIT] Container absent, build initial en cours..."
          docker build "https://github.com/$${REPO}.git#$${BRANCH}" -t $$IMAGE && start_container
        fi

        while true; do
          TS=$$(date '+%Y-%m-%d %H:%M:%S')
          LATEST=$$(curl -sf "https://api.github.com/repos/$${REPO}/commits/$${BRANCH}" | grep '"sha"' | head -1 | sed 's/.*"sha": "\([^"]*\)".*/\1/')
          if [ -z "$$LATEST" ]; then
            echo "[$$TS] Impossible de joindre GitHub, retry dans $${INTERVAL}s"
            sleep $$INTERVAL
            continue
          fi
          LAST=""
          [ -f "$$SHA_FILE" ] && LAST=$$(cat "$$SHA_FILE")
          if [ "$$LATEST" = "$$LAST" ]; then
            echo "[$$TS] Aucun changement ($${LATEST:0:8})"
          else
            echo "[$$TS] Nouveau commit detecte : $${LAST:0:8} -> $${LATEST:0:8}"
            echo "[$$TS] Rebuild en cours..."
            docker build "https://github.com/$${REPO}.git#$${BRANCH}" -t $$IMAGE
            if [ $$? -eq 0 ]; then
              docker stop $$CONTAINER 2>/dev/null
              docker rm $$CONTAINER 2>/dev/null
              start_container
              echo "$$LATEST" > "$$SHA_FILE"
              echo "[$$TS] Redeploiement reussi !"
            else
              echo "[$$TS] Echec du build !"
            fi
          fi
          sleep $$INTERVAL
        done
    network_mode: bridge

networks:
  nginx-proxy:
    external: true
